<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login | WiseWater</title>
        <link rel="stylesheet" href="style.css">
    </head>

<body>
    <main class="login-page">
        <section class="login-left">
            <div class="login-box">
                <h1>Login</h1>
                <p class="login-subtext">Enter your account details</p>

                <form>
                    <div class="input-group">

                        <input type="email" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <input type="password" placeholder="Password" required>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="forgot-btn">Forgot Password?</button>
                        <button type="submit" class="btn">Login</button>
                    </div>   

                </form>
            </div>

            <div class="signup-card">
                <p>Don't have an account?</p>
                <button class="signup-btn">Sign Up</button>
            </div>
        </section>

        <section class="login-right">
            <div class="welcome-card">
                <h1><em>Welcome to</em><br>WiseWater</h1>
                <p>Login to access your dashboard</p>
                <a href="index.html"><img src="https://cdn.discordapp.com/attachments/1481403521747128361/1496771382627930273/Water_Logo.jpg?ex=6a022aba&is=6a00d93a&hm=7c85bdae02729989c2e8649725a8054448fa5cd9f95bdd179b5cbc0e9a530620&"</a>
            </div>
        </section>
    </main>
    

</body>
</html>
