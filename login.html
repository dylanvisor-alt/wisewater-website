<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login | WiseWater</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <main class="login-page">
        <section class="login-left">
            <div class="welcome-card">
                <a href="index.html" class="logo">
                    <img src="assets/WiseWater_Logo.png" alt="WiseWater Logo">
                </a>
                
                <div class="welcome-card-text">
                    <h1>WiseWater</h1>
                </div>

            </div>

            <div class="login-box">
                <h1>Login</h1>
                <p class="login-subtext">Enter your account details</p>

                <form>
                    <div class="input-group">
                        <input type="email" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <input type="password" placeholder="Password" required>
                    </div>

                    <details class="forgot-password-section">
                        <summary class="forgot-btn">Forgot Password?</summary>

                        <div class="reset-password-input-group">
                            <input type="email" placeholder="Enter email address">
                            <button type="button" class="reset-submit-btn">Send</button>
                        </div>
                    </details>

                    <div class="form-actions">
                        <button type="submit" class="btn">Login</button>
                    </div>   

                </form>
            </div>

            <div class="signup-card">
                <p>Don't have an account?</p>
                <button class="signup-btn">Sign Up</button>
            </div>
        </section>

        <section class="login-right">
            <div class="carousel">
                <div class="carousel-group">
                    <div class="carousel-card"><img src="assets/Login_image1.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image2.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image3.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image4.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image5.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image6.jpeg"></div>
                </div>
                <div aria-hidden class="carousel-group"> 
                    <div class="carousel-card"><img src="assets/Login_image1.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image2.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image3.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image4.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image5.jpeg"></div>
                    <div class="carousel-card"><img src="assets/Login_image6.jpeg"></div>
                </div>
            </div>
        </section>
    </main>
    

</body>
</html>
