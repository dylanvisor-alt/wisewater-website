<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login | WiseWater</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <nav class="nav">
        <h1 class="logo">WiseWater</h1>
        <a href="index.html">Home</a>
    </nav>

    <main class="login-page">
        <section class="login-left">
            <div class="login-box">
                <h2>Login</h2>
                <p class="login-subtext">Water Usage Dashboard</p>

                <form>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="Enter Email Here" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter Password Here" required>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="forgot-btn">Forgot Password?</button>
                        <button type="submit" class="btn">Login</button>
                    </div>   

                </form>
            </div>

            <div class="signup-card">
                <p>Don't have an account?</p>
                <button class="signup-btn">Sign Up</button>
            </div>
        </section>

        <section class="login-right">
            <div class="welcome-card">
                <h1><em>Welcome to</em><br>WiseWater</h1>
                <p>Login to access your dashboard</p>
            </div>
        </section>
    </main>
    

</body>
</html>
