<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Support | WiseWater</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

<body>
    <nav class="nav">
        <h1 class="logo">WiseWater</h1>

        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="calculator.html">Calculator</a>
            <a href="resources.html">Resources</a>
            <a href="alerts.html">Support</a>
            <a href="index.html">Logout</a>
        </div>
    </nav>

    <main class="support-page">

        <section class="support-hero">
            <h2>Alerts & Support</h2>
            <p>View important updates and get help with managing your water usage.</p>
        </section>

        <section class="support-grid">
            <div class="support-card">
                <h3>Need Help?</h3>
                <p>If you are unsure where to start, contact support for simple guidance.</p>

                <form class="support-form">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter Your Name">

                    <label for="name">Email</label>
                    <input type="email" id="email" placeholder="Enter Your Email">
                    
                    <label for="name">Message</label>
                    <input type="message" rows="6" placeholder="How can we help you today?">

                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>
    
</body>
</html>
